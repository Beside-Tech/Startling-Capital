        - name

    UpdateStartupRequest:
      type: object
      properties:
        name:
          type: string
        sector:
          type: string
          nullable: true
        stage:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        active:
          type: boolean

    CreateJudgeRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        title:
          type: string
          nullable: true
