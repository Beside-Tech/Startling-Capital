openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nobellum Score Sheet API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: programs
    description: Programs and cohorts
  - name: config
    description: Configuration
  - name: scores
    description: Scoring
  - name: committee
    description: Committee analytics
  - name: export
    description: Export
  - name: admin
  - name: deal-flow
    description: Deal pipeline and state machine
  - name: ic-operations
    description: Investment Committee voting and operations
  - name: term-sheets
    description: Term sheet management
  - name: diligence
    description: Due diligence checklists
  - name: closing
    description: Closing workflow checklists
  - name: board-materials
    description: Board meeting materials
  - name: capital-calls
    description: LP capital call engine
  - name: cap-table
    description: Portfolio cap table
  - name: fund-admin
    description: Fund metrics snapshots and fund administration
  - name: lp-portal
    description: LP portal with quarterly updates and K-1

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and PIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /programs:
    get:
      operationId: getPrograms
      tags: [programs]
      summary: List programs (filtered for judge)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Programs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"

  /cohorts:
    get:
      operationId: getCohorts
      tags: [programs]
      summary: List cohorts for a program (filtered for judge)
      security:
        - bearerAuth: []
      parameters:
        - name: programId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cohorts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cohort"

  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get full config for a program/cohort (rounds, startups, rubric, etc.)
      security:
        - bearerAuth: []
      parameters:
        - name: programId
          in: query
          required: true
          schema:
            type: string
        - name: cohortId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scores/submit:
    post:
      operationId: submitScores
      tags: [scores]
      summary: Submit score rows (upsert by dedupe key)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitScoresRequest"
      responses:
        "200":
          description: Scores submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitScoresResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scores:
    get:
      operationId: getScores
      tags: [scores]
      summary: Get scores with filters
      security:
        - bearerAuth: []
      parameters:
        - name: programId
          in: query
          required: true
          schema:
            type: string
        - name: cohortId
          in: query
          required: true
          schema:
            type: string
        - name: round
          in: query
          required: true
          schema:
            type: string
        - name: startupId
          in: query
          schema:
            type: integer
        - name: judgeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Scores list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"

  /committee/analytics:
    get:
      operationId: getCommitteeAnalytics
      tags: [committee]
      summary: Get committee analytics (rankings, judge analytics, matrix)
      security:
        - bearerAuth: []
      parameters:
        - name: programId
          in: query
          required: true
          schema:
            type: string
        - name: cohortId
          in: query
          required: true
          schema:
            type: string
        - name: round
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /committee/advance-preview:
    get:
      operationId: getAdvancePreview
      tags: [committee]
      summary: Preview auto-advance decisions
      security:
        - bearerAuth: []
      parameters:
        - name: programId
          in: query
          required: true
          schema:
            type: string
        - name: cohortId
          in: query
          required: true
          schema:
            type: string
        - name: fromRound
          in: query
          required: true
          schema:
            type: string
        - name: toRound
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Advance preview
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdvancePreviewItem"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /export/excel:
    get:
      operationId: exportExcel
      tags: [export]
      summary: Export results to Excel (.xlsx)
      security:
        - bearerAuth: []
      parameters:
        - name: programId
          in: query
          required: true
          schema:
            type: string
        - name: cohortId
          in: query
          required: true
          schema:
            type: string
        - name: round
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/programs:
    get:
      operationId: adminGetPrograms
      tags: [admin]
      summary: Get all programs (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
    post:
      operationId: adminCreateProgram
      tags: [admin]
      summary: Create program
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"

  /admin/programs/{id}:
    put:
      operationId: adminUpdateProgram
      tags: [admin]
      summary: Update program
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProgramRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"
    delete:
      operationId: adminDeleteProgram
      tags: [admin]
      summary: Delete program
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/cohorts:
    get:
      operationId: adminGetCohorts
      tags: [admin]
      summary: Get all cohorts (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: programId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Cohorts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cohort"
    post:
      operationId: adminCreateCohort
      tags: [admin]
      summary: Create cohort
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCohortRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cohort"

  /admin/cohorts/{id}:
    put:
      operationId: adminUpdateCohort
      tags: [admin]
      summary: Update cohort
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCohortRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cohort"
    delete:
      operationId: adminDeleteCohort
      tags: [admin]
      summary: Delete cohort
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/startups:
    get:
      operationId: adminGetStartups
      tags: [admin]
      summary: Get all startups (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: programId
          in: query
          schema:
            type: string
        - name: cohortId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Startups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Startup"
    post:
      operationId: adminCreateStartup
      tags: [admin]
      summary: Create startup
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStartupRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Startup"

  /admin/startups/{id}:
    put:
      operationId: adminUpdateStartup
      tags: [admin]
      summary: Update startup
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStartupRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Startup"
    delete:
      operationId: adminDeleteStartup
      tags: [admin]
      summary: Delete startup
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/judges:
    get:
      operationId: adminGetJudges
      tags: [admin]
      summary: Get all judges (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Judges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JudgeWithUser"
    post:
      operationId: adminCreateJudge
      tags: [admin]
      summary: Create judge and user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJudgeRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJudgeResponse"

  /admin/judges/{id}:
    put:
      operationId: adminUpdateJudge
      tags: [admin]
      summary: Update judge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJudgeRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Judge"
    delete:
      operationId: adminDeleteJudge
      tags: [admin]
      summary: Delete judge and user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/judges/{id}/reset-pin:
    post:
      operationId: adminResetPin
      tags: [admin]
      summary: Reset judge PIN (generates random, returns plaintext once)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPinRequest"
      responses:
        "200":
          description: PIN reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPinResponse"

  /admin/assignments:
    get:
      operationId: adminGetAssignments
      tags: [admin]
      summary: Get all assignments (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
    post:
      operationId: adminCreateAssignment
      tags: [admin]
      summary: Create assignment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssignmentRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"

  /admin/assignments/{id}:
    delete:
      operationId: adminDeleteAssignment
      tags: [admin]
      summary: Delete assignment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/ic/deals:
    get:
      tags: [ic-operations]
      summary: List all deals (IC view)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of deals
  /api/ic/deals/{id}:
    get:
      tags: [ic-operations]
      summary: Get deal detail
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deal detail
    put:
      tags: [ic-operations]
      summary: Update deal fields (no pipelineStage)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string }
                decisionDate: { type: string }
                sector: { type: string }
                stage: { type: string }
                amountSoughtCad: { type: number }
                instrument: { type: string }
      responses:
        "200":
          description: Updated deal
        "400":
          description: pipelineStage not allowed here
  /api/deals/{id}/stage:
    patch:
      tags: [deal-flow]
      summary: Advance deal pipeline stage via state machine
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [toStage]
              properties:
                toStage:
                  type: string
                  enum:
                    - sourced
                    - interested
                    - due_diligence
                    - ready_for_ic
                    - ic_approved
                    - ic_rejected
                    - closing
                    - invested
                    - passed
                    - deal_dead
      responses:
        "200":
          description: Stage advanced
        "400":
          description: Invalid transition
        "403":
          description: Insufficient role for this transition
  /api/ic/deals/{id}/vote:
    post:
      tags: [ic-operations]
      summary: Cast IC vote; auto-advances stage on majority
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vote]
              properties:
                vote:
                  type: string
                  enum: [approve, reject, abstain]
                comment: { type: string }
      responses:
        "200":
          description: Vote recorded; tally and optional auto-advance stage
          content:
            application/json:
              schema:
                type: object
                properties:
                  icVote: { type: object }
                  tally: { type: object }
                  autoAdvancedTo: { type: string, nullable: true }
  /api/mp/term-sheets:
    get:
      tags: [term-sheets]
      summary: List all term sheets
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of term sheets
    post:
      tags: [term-sheets]
      summary: Create term sheet (equityPct auto-calculated)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dealId]
              properties:
                dealId: { type: integer }
                valuationCapCad: { type: number }
                investmentAmountCad: { type: number }
                instrument: { type: string }
                discountRate: { type: number }
                maturityDate: { type: string }
                boardSeat: { type: boolean }
                proRataRights: { type: boolean }
                status: { type: string }
      responses:
        "201":
          description: Term sheet created with equityPct
  /api/mp/term-sheets/{id}:
    put:
      tags: [term-sheets]
      summary: Update term sheet
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated term sheet
  /api/diligence/checklists:
    get:
      tags: [diligence]
      summary: List diligence checklists
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List
    post:
      tags: [diligence]
      summary: Create diligence checklist for a deal
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dealId]
              properties:
                dealId: { type: integer }
                name: { type: string }
      responses:
        "201":
          description: Checklist created
  /api/diligence/checklists/{id}:
    get:
      tags: [diligence]
      summary: Get diligence checklist with items
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Checklist and items
  /api/diligence/checklists/{checklistId}/items/{itemId}:
    patch:
      tags: [diligence]
      summary: Update diligence item status
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: checklistId
          required: true
          schema: { type: integer }
        - in: path
          name: itemId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated item
  /api/closing/checklists:
    get:
      tags: [closing]
      summary: List closing checklists
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List
    post:
      tags: [closing]
      summary: Create closing checklist for a deal (seeds default items)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dealId]
              properties:
                dealId: { type: integer }
                name: { type: string }
                notes: { type: string }
      responses:
        "201":
          description: Checklist with default items
  /api/closing/checklists/{id}:
    get:
      tags: [closing]
      summary: Get closing checklist with items
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Checklist and items
  /api/closing/checklists/{checklistId}/items/{itemId}:
    patch:
      tags: [closing]
      summary: Mark closing checklist item complete/incomplete
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: checklistId
          required: true
          schema: { type: integer }
        - in: path
          name: itemId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isComplete: { type: boolean }
                notes: { type: string }
      responses:
        "200":
          description: Updated item
  /api/board/meetings:
    get:
      tags: [board-materials]
      summary: List board meetings
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of meetings
    post:
      tags: [board-materials]
      summary: Create board meeting
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyName, title]
              properties:
                companyName: { type: string }
                title: { type: string }
                scheduledAt: { type: string }
                agenda: { type: string }
                founderId: { type: integer }
      responses:
        "201":
          description: Meeting created
  /api/board/meetings/{id}:
