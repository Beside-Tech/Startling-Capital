components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        pin:
          type: string
      required:
        - email
        - pin

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        role:
          type: string
        user:
          $ref: "#/components/schemas/UserInfo"
        allowedAssignments:
          type: array
          items:
            $ref: "#/components/schemas/AllowedAssignment"
      required:
        - token
        - role
        - user
        - allowedAssignments

    UserInfo:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        judgeId:
          type: integer
          nullable: true
      required:
        - id
        - email
        - name
        - role

    AllowedAssignment:
      type: object
      properties:
        programId:
          type: string
        cohortId:
          type: string
      required:
        - programId
        - cohortId

    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserInfo"
        allowedAssignments:
          type: array
          items:
            $ref: "#/components/schemas/AllowedAssignment"
      required:
        - user
        - allowedAssignments

    Program:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        active:
          type: boolean
      required:
        - id
        - name
        - active

    Cohort:
      type: object
      properties:
        id:
          type: string
        programId:
          type: string
        name:
          type: string
        year:
          type: integer
        active:
          type: boolean
      required:
        - id
        - programId
        - name
        - year
        - active

    Round:
      type: object
      properties:
        id:
          type: integer
        programId:
          type: string
        name:
          type: string
        sequence:
          type: integer
        active:
          type: boolean
      required:
        - id
        - programId
        - name
        - sequence
        - active

    Startup:
      type: object
      properties:
        id:
          type: integer
        programId:
          type: string
        cohortId:
          type: string
        name:
          type: string
        sector:
          type: string
          nullable: true
        stage:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        active:
          type: boolean
      required:
        - id
        - programId
        - cohortId
        - name
        - active

    Judge:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        title:
          type: string
          nullable: true
        active:
          type: boolean
      required:
        - id
        - name
        - email
        - active

    JudgeWithUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        title:
          type: string
          nullable: true
        active:
          type: boolean
        userId:
          type: integer
          nullable: true
      required:
        - id
        - name
        - email
        - active

    RubricScale:
      type: object
      properties:
        score:
          type: integer
        label:
          type: string
        meaning:
          type: string
        active:
          type: boolean
      required:
        - score
        - label
        - meaning
        - active

    RubricCriterion:
      type: object
      properties:
        id:
          type: string
        programId:
          type: string
        roundName:
          type: string
        category:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        required:
          type: boolean
        weight:
          type: number
        maxScore:
          type: integer
        active:
          type: boolean
      required:
        - id
        - programId
        - roundName
        - category
        - name
        - required
        - weight
        - maxScore
        - active

    CriterionGuidance:
      type: object
      properties:
        id:
          type: integer
        criterionId:
          type: string
        score:
          type: integer
        guidanceText:
          type: string
        active:
          type: boolean
      required:
        - id
        - criterionId
        - score
        - guidanceText
        - active

    AdvancementRule:
      type: object
      properties:
        id:
          type: integer
        programId:
          type: string
        cohortId:
          type: string
        fromRound:
          type: string
        toRound:
          type: string
        thresholdPct:
          type: number
        minJudges:
          type: integer
        active:
          type: boolean
      required:
        - id
        - programId
        - cohortId
        - fromRound
        - toRound
        - thresholdPct
        - minJudges
        - active

    Assignment:
      type: object
      properties:
        id:
          type: integer
        programId:
          type: string
        cohortId:
          type: string
        judgeId:
          type: integer
        active:
          type: boolean
        judgeName:
          type: string
          nullable: true
        programName:
          type: string
          nullable: true
        cohortName:
          type: string
          nullable: true
      required:
        - id
        - programId
        - cohortId
        - judgeId
        - active

    ConfigResponse:
      type: object
      properties:
        rounds:
          type: array
          items:
            $ref: "#/components/schemas/Round"
        startups:
          type: array
          items:
            $ref: "#/components/schemas/Startup"
        judges:
          type: array
          items:
            $ref: "#/components/schemas/Judge"
        rubric:
          type: array
          items:
            $ref: "#/components/schemas/RubricCriterion"
        rubricScale:
          type: array
          items:
            $ref: "#/components/schemas/RubricScale"
        guidance:
          type: array
          items:
            $ref: "#/components/schemas/CriterionGuidance"
        advancementRules:
          type: array
          items:
            $ref: "#/components/schemas/AdvancementRule"
        judgeAssignments:
          type: array
          items:
            $ref: "#/components/schemas/Assignment"
      required:
        - rounds
        - startups
        - judges
        - rubric
        - rubricScale
        - guidance
        - advancementRules
        - judgeAssignments

    Score:
      type: object
      properties:
        id:
          type: integer
        programId:
          type: string
        cohortId:
          type: string
        roundName:
          type: string
        startupId:
          type: integer
        judgeId:
          type: integer
        criterionId:
          type: string
        score:
          type: integer
        weight:
          type: number
        comment:
          type: string
          nullable: true
        source:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - programId
        - cohortId
        - roundName
        - startupId
        - judgeId
        - criterionId
        - score
        - weight
        - source
        - createdAt
        - updatedAt

    ScoreRow:
      type: object
      properties:
        programId:
          type: string
        cohortId:
          type: string
        roundName:
          type: string
        startupId:
          type: integer
        judgeId:
          type: integer
        criterionId:
          type: string
        score:
          type: integer
        weight:
          type: number
        comment:
          type: string
          nullable: true
      required:
        - programId
        - cohortId
        - roundName
        - startupId
        - judgeId
        - criterionId
        - score
        - weight

    SubmitScoresRequest:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ScoreRow"
      required:
        - rows

    SubmitScoresResponse:
      type: object
      properties:
        submitted:
          type: integer
      required:
        - submitted

    StartupRanking:
      type: object
      properties:
        startupId:
          type: integer
        startupName:
          type: string
        avgPct:
          type: number
        sdPct:
          type: number
        judgeCount:
          type: integer
      required:
        - startupId
        - startupName
        - avgPct
        - sdPct
        - judgeCount

    JudgeAnalytic:
      type: object
      properties:
        judgeId:
          type: integer
        judgeName:
          type: string
        meanPct:
          type: number
        sdPct:
          type: number
        bias:
          type: number
        startupsScored:
          type: integer
      required:
        - judgeId
        - judgeName
        - meanPct
        - sdPct
        - bias
        - startupsScored

    MatrixCell:
      type: object
      properties:
        startupId:
          type: integer
        startupName:
          type: string
        judgeScores:
          type: object
          additionalProperties:
            type: number
      required:
        - startupId
        - startupName
        - judgeScores

    AnalyticsResponse:
      type: object
      properties:
        rankings:
          type: array
          items:
            $ref: "#/components/schemas/StartupRanking"
        judgeAnalytics:
          type: array
          items:
            $ref: "#/components/schemas/JudgeAnalytic"
        matrix:
          type: array
          items:
            $ref: "#/components/schemas/MatrixCell"
        judges:
          type: array
          items:
            $ref: "#/components/schemas/Judge"
      required:
        - rankings
        - judgeAnalytics
        - matrix
        - judges

    AdvancePreviewItem:
      type: object
      properties:
        startupId:
          type: integer
        startupName:
          type: string
        avgPct:
          type: number
        judgeCount:
          type: integer
        decision:
          type: string
          enum: [advance, hold]
        thresholdPct:
          type: number
        minJudges:
          type: integer
      required:
        - startupId
        - startupName
        - avgPct
        - judgeCount
        - decision
        - thresholdPct
        - minJudges

    CreateProgramRequest:
