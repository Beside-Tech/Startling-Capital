openapi: "3.0.3"
info:
  title: Nobellum Ventures API
  version: "2.0.0"
  description: >
    Full VC management platform API covering deal flow, IC operations,
    term sheets, due diligence, fund administration, capital calls, and LP portal.

servers:
  - url: /api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PipelineStage:
      type: string
      enum: [sourced, screening, due_diligence, ic_review, term_sheet, closed, passed]

    IcVote:
      type: string
      enum: [approve, reject, abstain, more_info]

    Deal:
      type: object
      properties:
        id: { type: integer }
        companyName: { type: string }
        sector: { type: string, nullable: true }
        stage: { type: string, nullable: true }
        amountSoughtCad: { type: string, nullable: true }
        instrument: { type: string }
        pipelineStage: { $ref: "#/components/schemas/PipelineStage" }
        source: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        decisionDate: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        assignedToName: { type: string, nullable: true }

    VoteTally:
      type: object
      properties:
        total: { type: integer }
        approves: { type: integer }
        rejects: { type: integer }

    IcMeeting:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        scheduledAt: { type: string, format: date-time, nullable: true }
        status:
          type: string
          enum: [draft, scheduled, in_progress, completed, cancelled]
        quorumReached: { type: boolean }
        agenda: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        createdByName: { type: string, nullable: true }

    TermSheet:
      type: object
      properties:
        id: { type: integer }
        dealId: { type: integer }
        version: { type: integer }
        status:
          type: string
          enum: [draft, sent, negotiating, signed, withdrawn]
        valuationPreMoneyCad: { type: string, nullable: true }
        investmentAmountCad: { type: string, nullable: true }
        equityPct: { type: string, nullable: true, description: "Auto-calculated from valuation + investment" }
        instrument: { type: string }
        discountRate: { type: string, nullable: true }
        valuationCap: { type: string, nullable: true }
        proRataRights: { type: boolean }
        boardSeat: { type: boolean }
        informationRights: { type: boolean }
        closingConditions: { type: string, nullable: true }
        expiryDate: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    Fund:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        vintage: { type: integer }
        currency: { type: string }
        fundSizeCad: { type: string, nullable: true }
        committedCapitalCad: { type: string, nullable: true }
        calledCapitalCad: { type: string, nullable: true }
        distributedCapitalCad: { type: string, nullable: true }
        navCad: { type: string, nullable: true }
        tvpi: { type: string, nullable: true }
        dpi: { type: string, nullable: true }
        rvpi: { type: string, nullable: true }
        irr: { type: string, nullable: true }
        status:
          type: string
          enum: [fundraising, investing, harvesting, closed]
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    LpQuarterlyUpdate:
      type: object
      properties:
        id: { type: integer }
        quarter: { type: integer }
        year: { type: integer }
        title: { type: string }
        body: { type: string }
        tvpi: { type: string, nullable: true }
        dpi: { type: string, nullable: true }
        rvpi: { type: string, nullable: true }
        irr: { type: string, nullable: true }
        nav: { type: string, nullable: true }
        totalDeployedCad: { type: string, nullable: true }
        portfolioCount: { type: integer, nullable: true }
        isPublished: { type: boolean }
        publishedAt: { type: string, format: date-time, nullable: true }

    CapitalCall:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        callDate: { type: string }
        dueDate: { type: string, nullable: true }
        totalAmountCad: { type: string, nullable: true }
        status:
          type: string
          enum: [draft, sent, partial, complete]
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CapitalCallAllocation:
      type: object
      properties:
        id: { type: integer }
        capitalCallId: { type: integer }
        lpProfileId: { type: integer }
        allocatedAmountCad: { type: string, nullable: true }
        paidAt: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }

    LpFundSummary:
      type: object
      properties:
        profile:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            firmName: { type: string, nullable: true }
            contactName: { type: string, nullable: true }
            commitmentCad: { type: string, nullable: true }
            capitalCalledCad: { type: string, nullable: true }
            totalCalledCad: { type: string }
        capitalCalls:
          type: array
          items: { $ref: "#/components/schemas/CapitalCallAllocation" }
        funds:
          type: array
          items: { $ref: "#/components/schemas/Fund" }

    Error:
      type: object
      properties:
        error: { type: string }

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and PIN
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, pin]
              properties:
                email: { type: string, format: email }
                pin: { type: string }
      responses:
        "200":
          description: JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /deals/{id}/stage:
    patch:
      tags: [Deal Flow]
      summary: Advance deal to next pipeline stage (state machine)
      description: >
        Enforces valid transitions: sourced→screening, screening→due_diligence,
        due_diligence→ic_review, ic_review→term_sheet|passed, term_sheet→closed|passed.
        Advancing to ic_review, term_sheet, or closed requires ManagingPartner role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage]
              properties:
                stage: { $ref: "#/components/schemas/PipelineStage" }
      responses:
        "200":
          description: Updated deal
          content:
            application/json:
              schema:
                type: object
                properties:
                  deal: { $ref: "#/components/schemas/Deal" }
        "403":
          description: Role not permitted for this transition
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Invalid transition
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /ic/deals:
    get:
      tags: [IC Operations]
      summary: List all deals with vote tallies
      responses:
        "200":
          description: Deals and vote counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  deals:
                    type: array
                    items: { $ref: "#/components/schemas/Deal" }
                  voteCounts:
                    type: array
                    items:
                      type: object
                      properties:
                        dealId: { type: integer }
                        vote: { $ref: "#/components/schemas/IcVote" }
                        cnt: { type: integer }
    post:
      tags: [IC Operations]
      summary: Create a new deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyName]
              properties:
                companyName: { type: string }
                sector: { type: string }
                stage: { type: string }
                amountSoughtCad: { type: string }
                instrument: { type: string }
                pipelineStage: { $ref: "#/components/schemas/PipelineStage" }
                source: { type: string }
                notes: { type: string }
      responses:
        "201":
          description: Created deal
          content:
            application/json:
              schema:
                type: object
                properties:
                  deal: { $ref: "#/components/schemas/Deal" }

  /ic/deals/{id}/vote:
    post:
      tags: [IC Operations]
      summary: Cast or update IC vote; auto-advances deal on majority
      description: >
        After recording the vote, tallies all votes for the deal. If ≥3 votes and
        the deal is in ic_review: majority approve → term_sheet, majority reject → passed.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vote]
              properties:
                vote: { $ref: "#/components/schemas/IcVote" }
                comment: { type: string }
      responses:
        "200":
          description: Vote recorded with tally and optional auto-advance
          content:
            application/json:
              schema:
                type: object
                properties:
                  vote:
                    type: object
                    properties:
                      id: { type: integer }
                      vote: { $ref: "#/components/schemas/IcVote" }
                      comment: { type: string, nullable: true }
                  tally: { $ref: "#/components/schemas/VoteTally" }
                  autoAdvancedTo:
                    type: string
                    nullable: true
                    description: New pipeline stage if auto-advanced, else null

  /ic/meetings:
    get:
      tags: [IC Operations]
      summary: List IC meetings (IC or ManagingPartner)
      responses:
        "200":
          description: Meetings list
          content:
            application/json:
              schema:
                type: object
                properties:
                  meetings:
                    type: array
                    items: { $ref: "#/components/schemas/IcMeeting" }
    post:
      tags: [IC Operations]
      summary: Create IC meeting (ManagingPartner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                scheduledAt: { type: string, format: date-time }
                agenda: { type: string }
                status: { type: string }
                notes: { type: string }
      responses:
        "201":
          description: Created meeting
          content:
            application/json:
              schema:
                type: object
                properties:
                  meeting: { $ref: "#/components/schemas/IcMeeting" }

  /ic/meetings/{id}:
    get:
      tags: [IC Operations]
      summary: Get IC meeting detail with deal packets
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Meeting with deals
          content:
            application/json:
              schema:
                type: object
                properties:
                  meeting: { $ref: "#/components/schemas/IcMeeting" }
                  deals:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        dealId: { type: integer }
                        companyName: { type: string }
                        recommendation: { type: string, nullable: true }
                        packetUrl: { type: string, nullable: true }
    put:
      tags: [IC Operations]
      summary: Update IC meeting
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                status: { type: string }
                agenda: { type: string }
                quorumReached: { type: boolean }
                notes: { type: string }
      responses:
        "200":
          description: Updated meeting

  /term-sheets:
    get:
      tags: [Term Sheets]
      summary: List all term sheets (IC + MP)
      responses:
        "200":
          description: Term sheets list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sheets:
                    type: array
                    items: { $ref: "#/components/schemas/TermSheet" }
    post:
      tags: [Term Sheets]
      summary: Create term sheet with auto-calculated equity%
      description: equityPct is auto-calculated as investmentAmountCad / (valuationPreMoneyCad + investmentAmountCad) × 100
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dealId]
              properties:
                dealId: { type: integer }
                instrument: { type: string }
                valuationPreMoneyCad: { type: string }
                investmentAmountCad: { type: string }
                discountRate: { type: string }
                valuationCap: { type: string }
                proRataRights: { type: boolean }
                boardSeat: { type: boolean }
                informationRights: { type: boolean }
                closingConditions: { type: string }
                expiryDate: { type: string }
                notes: { type: string }
      responses:
        "201":
          description: Created term sheet with equityPct
          content:
            application/json:
              schema:
                type: object
                properties:
                  sheet: { $ref: "#/components/schemas/TermSheet" }

  /term-sheets/{id}:
    put:
      tags: [Term Sheets]
      summary: Update term sheet; recalculates equityPct if valuation or investment changes
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string }
                instrument: { type: string }
                valuationPreMoneyCad: { type: string }
                investmentAmountCad: { type: string }
                discountRate: { type: string }
                proRataRights: { type: boolean }
                boardSeat: { type: boolean }
      responses:
        "200":
          description: Updated term sheet

  /mp/funds:
    get:
      tags: [Fund Administration]
      summary: List all funds with TVPI/DPI/RVPI/IRR metrics
      responses:
        "200":
          description: Funds list
          content:
            application/json:
              schema:
                type: object
                properties:
                  funds:
                    type: array
                    items: { $ref: "#/components/schemas/Fund" }
    post:
      tags: [Fund Administration]
      summary: Create a new fund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, vintage]
              properties:
                name: { type: string }
                vintage: { type: integer }
                fundSizeCad: { type: string }
                tvpi: { type: string }
                dpi: { type: string }
                rvpi: { type: string }
                irr: { type: string }
                status: { type: string }
      responses:
        "201":
          description: Created fund
          content:
            application/json:
              schema:
                type: object
                properties:
                  fund: { $ref: "#/components/schemas/Fund" }

  /mp/funds/{id}:
    put:
      tags: [Fund Administration]
      summary: Update fund metrics
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tvpi: { type: string }
                dpi: { type: string }
                rvpi: { type: string }
                irr: { type: string }
                navCad: { type: string }
                status: { type: string }
      responses:
        "200":
          description: Updated fund

  /mp/capital-calls:
    get:
      tags: [Capital Calls]
      summary: List all capital calls with allocations
      responses:
        "200":
          description: Capital calls
    post:
      tags: [Capital Calls]
      summary: Create capital call
      responses:
        "201":
          description: Created capital call

  /mp/capital-calls/{id}/generate-allocations:
    post:
      tags: [Capital Calls]
      summary: Pro-rata engine — generate LP allocations from committed capital
      description: >
        Calculates each LP's allocation as (LP_committed / total_committed) × totalAmountCad.
        Deletes any existing allocations for this call before re-generating.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "201":
          description: Generated allocations
          content:
            application/json:
              schema:
                type: object
                properties:
                  allocations:
                    type: array
                    items: { $ref: "#/components/schemas/CapitalCallAllocation" }
                  totalAllocated: { type: number }
                  lpCount: { type: integer }
        "400":
          description: No total amount or no committed capital
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /mp/quarterly-updates:
    get:
      tags: [LP Portal]
      summary: List all quarterly updates (MP view, includes unpublished)
      responses:
        "200":
          description: All updates
          content:
            application/json:
              schema:
                type: object
                properties:
                  updates:
                    type: array
                    items: { $ref: "#/components/schemas/LpQuarterlyUpdate" }
    post:
      tags: [LP Portal]
      summary: Create quarterly update (with RVPI)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quarter, year, title, body]
              properties:
                quarter: { type: integer, minimum: 1, maximum: 4 }
                year: { type: integer }
                title: { type: string }
                body: { type: string }
                tvpi: { type: string }
                dpi: { type: string }
                rvpi: { type: string }
                irr: { type: string }
                nav: { type: string }
                isPublished: { type: boolean }
      responses:
        "201":
          description: Created update

  /lp/quarterly-updates:
    get:
      tags: [LP Portal]
      summary: List published quarterly updates (LP view, includes RVPI)
      responses:
        "200":
          description: Published updates
          content:
            application/json:
              schema:
                type: object
                properties:
                  updates:
                    type: array
                    items: { $ref: "#/components/schemas/LpQuarterlyUpdate" }

  /lp/fund-summary:
    get:
      tags: [LP Portal]
      summary: LP fund summary — profile, capital calls, fund metrics
      responses:
        "200":
          description: LP fund summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LpFundSummary" }

  /lp/k1/{year}:
    get:
      tags: [LP Portal]
      summary: K-1 tax document placeholder for a given year
      parameters:
        - in: path
          name: year
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: K-1 placeholder with LP info and availability message
          content:
            application/json:
              schema:
                type: object
                properties:
                  placeholder: { type: boolean }
                  year: { type: integer }
                  lpName: { type: string, nullable: true }
                  firmName: { type: string, nullable: true }
                  commitmentCad: { type: string, nullable: true }
                  message: { type: string }

  /diligence/threads:
    get:
      tags: [Due Diligence]
      summary: List diligence Q&A threads (IC + MP)
      responses:
        "200":
          description: Threads list
    post:
      tags: [Due Diligence]
      summary: Create a diligence Q&A thread
      responses:
        "201":
          description: Created thread

  /mp/founder-asks:
    get:
      tags: [Founder Asks]
      summary: List founder asks (IC + MP view)
      responses:
        "200":
          description: Founder asks
    post:
      tags: [Founder Asks]
      summary: Create founder ask
      responses:
        "201":
          description: Created ask

  /founder/asks:
    get:
      tags: [Founder Asks]
      summary: List founder's own asks
      responses:
        "200":
          description: Founder's asks
    post:
      tags: [Founder Asks]
      summary: Submit a new ask
      responses:
        "201":
          description: Ask submitted
